<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg3)"/>
  <!-- 装飾 -->
  <circle cx="700" cy="80" r="130" fill="rgba(255,255,255,0.05)"/>
  <circle cx="100" cy="370" r="100" fill="rgba(255,255,255,0.05)"/>
  <!-- 130万の壁ビジュアル -->
  <g transform="translate(460, 50)">
    <rect x="0" y="0" width="280" height="300" rx="20" fill="rgba(255,255,255,0.1)"/>
    <!-- 壁のイメージ -->
    <rect x="30" y="30" width="220" height="20" rx="4" fill="rgba(255,255,255,0.08)"/>
    <!-- バーチャート -->
    <rect x="45" y="200" width="40" height="70" rx="4" fill="#6ee7b7" opacity="0.8"/>
    <text x="65" y="195" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">95万</text>
    <rect x="105" y="160" width="40" height="110" rx="4" fill="#fbbf24" opacity="0.8"/>
    <text x="125" y="155" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">110万</text>
    <rect x="165" y="100" width="40" height="170" rx="4" fill="#f87171" opacity="0.8"/>
    <text x="185" y="95" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">130万</text>
    <!-- 130万ライン -->
    <line x1="25" y1="105" x2="250" y2="105" stroke="#f87171" stroke-width="2" stroke-dasharray="6,4"/>
    <rect x="140" y="60" width="110" height="30" rx="15" fill="#f87171"/>
    <text x="195" y="80" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">130万の壁</text>
    <!-- 底線 -->
    <line x1="30" y1="270" x2="250" y2="270" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="65" y="290" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">セーフ</text>
    <text x="125" y="290" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">注意</text>
    <text x="185" y="290" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">超過</text>
  </g>
  <!-- テキスト -->
  <text x="60" y="140" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="38" fill="white" font-weight="900">扶養 × Uber</text>
  <text x="60" y="195" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">130万円の壁を</text>
  <text x="60" y="230" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">徹底解説</text>
  <!-- タグ -->
  <g transform="translate(60, 270)">
    <rect x="0" y="0" width="100" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
    <text x="50" y="21" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">2026年版</text>
  </g>
  <g transform="translate(170, 270)">
    <rect x="0" y="0" width="90" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
    <text x="45" y="21" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">大学生</text>
  </g>
</svg>
