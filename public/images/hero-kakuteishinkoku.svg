<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg4)"/>
  <!-- 装飾 -->
  <circle cx="680" cy="60" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="80" cy="370" r="90" fill="rgba(255,255,255,0.05)"/>
  <!-- 確定申告書ビジュアル -->
  <g transform="translate(470, 40)">
    <!-- 書類1（後ろ） -->
    <rect x="30" y="20" width="240" height="310" rx="8" fill="rgba(255,255,255,0.15)" transform="rotate(5, 150, 170)"/>
    <!-- 書類2（前） -->
    <rect x="10" y="10" width="240" height="310" rx="8" fill="rgba(255,255,255,0.2)"/>
    <!-- ヘッダー -->
    <rect x="10" y="10" width="240" height="45" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="130" y="40" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="bold">確定申告書 B</text>
    <!-- 入力欄 -->
    <rect x="25" y="70" width="90" height="14" rx="3" fill="rgba(255,255,255,0.12)"/>
    <rect x="130" y="70" width="105" height="14" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="25" y="95" width="60" height="14" rx="3" fill="rgba(255,255,255,0.12)"/>
    <rect x="100" y="95" width="135" height="14" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="25" y="120" width="75" height="14" rx="3" fill="rgba(255,255,255,0.12)"/>
    <rect x="115" y="120" width="120" height="14" rx="3" fill="rgba(255,255,255,0.08)"/>
    <!-- セクション -->
    <rect x="25" y="150" width="210" height="1" fill="rgba(255,255,255,0.1)"/>
    <rect x="25" y="165" width="100" height="14" rx="3" fill="rgba(255,255,255,0.12)"/>
    <rect x="140" y="165" width="95" height="14" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="25" y="190" width="80" height="14" rx="3" fill="rgba(255,255,255,0.12)"/>
    <rect x="120" y="190" width="115" height="14" rx="3" fill="rgba(255,255,255,0.08)"/>
    <!-- チェックマーク -->
    <circle cx="200" cy="250" r="35" fill="#10b981" opacity="0.9"/>
    <path d="M185 250 L195 260 L215 240" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- テキスト -->
  <text x="60" y="145" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="38" fill="white" font-weight="900">確定申告</text>
  <text x="60" y="195" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="38" fill="white" font-weight="900">完全マニュアル</text>
  <text x="60" y="245" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" fill="rgba(255,255,255,0.7)">大学生のUber Eats確定申告を</text>
  <text x="60" y="275" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" fill="rgba(255,255,255,0.7)">ゼロからわかりやすく図解</text>
  <!-- タグ -->
  <g transform="translate(60, 305)">
    <rect x="0" y="0" width="100" height="32" rx="16" fill="rgba(255,255,255,0.2)"/>
    <text x="50" y="21" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">2026年版</text>
  </g>
  <g transform="translate(170, 305)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="rgba(255,255,255,0.2)"/>
    <text x="65" y="21" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">バイト掛持ち対応</text>
  </g>
</svg>
