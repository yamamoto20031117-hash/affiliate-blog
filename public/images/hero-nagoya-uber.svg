<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)"/>
  <!-- 装飾 -->
  <circle cx="680" cy="100" r="150" fill="rgba(255,255,255,0.05)"/>
  <circle cx="750" cy="350" r="80" fill="rgba(255,255,255,0.05)"/>
  <circle cx="50" cy="50" r="60" fill="rgba(255,255,255,0.03)"/>
  <!-- 時給メーター -->
  <g transform="translate(500, 60)">
    <rect x="0" y="0" width="240" height="280" rx="20" fill="rgba(255,255,255,0.12)" />
    <rect x="15" y="15" width="210" height="100" rx="12" fill="rgba(255,255,255,0.15)" />
    <text x="120" y="50" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">時給</text>
    <text x="120" y="95" font-family="Arial, sans-serif" font-size="48" fill="white" text-anchor="middle" font-weight="900">¥2,000</text>
    <!-- バー -->
    <rect x="25" y="135" width="190" height="12" rx="6" fill="rgba(255,255,255,0.15)"/>
    <rect x="25" y="135" width="155" height="12" rx="6" fill="#fbbf24"/>
    <text x="25" y="170" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">¥0</text>
    <text x="195" y="170" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">¥2,500</text>
    <!-- 内訳 -->
    <rect x="25" y="190" width="190" height="1" fill="rgba(255,255,255,0.1)"/>
    <text x="25" y="215" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">正味の料金</text>
    <text x="215" y="215" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="end" font-weight="bold">¥1,200</text>
    <text x="25" y="245" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">プロモーション</text>
    <text x="215" y="245" font-family="Arial, sans-serif" font-size="14" fill="#fbbf24" text-anchor="end" font-weight="bold">¥800</text>
    <text x="25" y="270" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">チップ</text>
    <text x="215" y="270" font-family="Arial, sans-serif" font-size="14" fill="#6ee7b7" text-anchor="end" font-weight="bold">¥200</text>
  </g>
  <!-- 原付アイコン -->
  <g transform="translate(60, 80)">
    <circle cx="40" cy="40" r="40" fill="rgba(255,255,255,0.1)"/>
    <text x="40" y="52" font-size="36" text-anchor="middle">🛵</text>
  </g>
  <!-- テキスト -->
  <text x="60" y="190" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="42" fill="white" font-weight="900">名古屋 × 原付</text>
  <text x="60" y="245" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">大学生のリアルな稼ぎを公開</text>
  <!-- タグ -->
  <g transform="translate(60, 280)">
    <rect x="0" y="0" width="110" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
    <text x="55" y="21" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">実データ公開</text>
  </g>
  <g transform="translate(180, 280)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
    <text x="60" y="21" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">時給2,000円</text>
  </g>
</svg>
